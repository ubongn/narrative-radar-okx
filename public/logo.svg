<svg width="120" height="28" viewBox="0 0 120 28" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Radar icon -->
  <g transform="translate(4, 2)">
    <!-- Outer ring -->
    <circle cx="12" cy="12" r="11" stroke="#3b82f6" stroke-width="1.5" fill="none" opacity="0.3"/>
    <!-- Middle ring -->
    <circle cx="12" cy="12" r="7" stroke="#3b82f6" stroke-width="1.5" fill="none" opacity="0.5"/>
    <!-- Inner dot -->
    <circle cx="12" cy="12" r="2.5" fill="#3b82f6"/>
    <!-- Radar sweep -->
    <path d="M12 12 L12 1 A11 11 0 0 1 22.5 7.5 Z" fill="#3b82f6" opacity="0.15"/>
    <!-- Velocity arrow (acceleration concept) -->
    <path d="M14 10 L19 5 M19 5 L16.5 5.5 M19 5 L18.5 7.5" stroke="#f97316" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
  <!-- Wordmark -->
  <text x="32" y="18" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="15" font-weight="700" fill="#111827" letter-spacing="-0.3">
    NarrativeRadar
  </text>
</svg>
